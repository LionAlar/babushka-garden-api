services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: garden_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://db:5432/garden_db
      DB_USER: postgres
      DB_PASSWORD: qwerty
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: